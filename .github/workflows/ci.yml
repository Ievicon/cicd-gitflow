# =============================================================================
# CI — runs on every Pull Request (and on pushes to dev/main).
# This is the "Continuous Integration" part: build + lint + test BEFORE merge.
# Make this a REQUIRED status check in branch protection so broken code can't merge.
# Place at: .github/workflows/ci.yml
# =============================================================================
name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches:
      - develop
      - 'release/**'
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        run: npm ci

      # - name: Lint            # uncomment when you add eslint
      #   run: npm run lint

      # - name: Test            # uncomment when you add tests
      #   run: npm test

      - name: Build (verifies the app compiles)
        run: npm run build
